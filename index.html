<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff007f" />
  <title>Aniversário da Arielly • 7 anos</title>
  <style>
    :root{
      --pink-1:#ff007f;
      --pink-2:#ff3399;
      --pink-3:#ffb3d9;
      --purple:#7c3aed;
      --bg1:#ffe0f0;
      --bg2:#ffd1e8;
      --text:#2b1b2a;
      --card:#ffffffcc;
      --shadow: 0 18px 50px rgba(255,0,127,.25);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:
        radial-gradient(1000px 700px at 15% 10%, #ffffff 0%, transparent 60%),
        radial-gradient(900px 600px at 80% 25%, #fff 0%, transparent 58%),
        radial-gradient(800px 600px at 40% 85%, #fff 0%, transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    .sparkles{
      position:fixed; inset:0;
      pointer-events:none;
      background:
        radial-gradient(2px 2px at 10% 20%, rgba(255,0,127,.45) 50%, transparent 55%),
        radial-gradient(2px 2px at 25% 70%, rgba(124,58,237,.35) 50%, transparent 55%),
        radial-gradient(2px 2px at 80% 30%, rgba(255,179,217,.75) 50%, transparent 55%),
        radial-gradient(2px 2px at 60% 85%, rgba(255,0,127,.3) 50%, transparent 55%),
        radial-gradient(2px 2px at 90% 70%, rgba(124,58,237,.22) 50%, transparent 55%);
      opacity:.9;
      filter: blur(.2px);
      animation: floatBg 8s ease-in-out infinite alternate;
    }
    @keyframes floatBg{
      from{transform:translateY(0)}
      to{transform:translateY(-12px)}
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: clamp(18px, 4vw, 34px);
    }

    .card{
      width: min(940px, 100%);
      background: var(--card);
      border: 1px solid rgba(255,0,127,.18);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: clamp(16px, 3.5vw, 30px);
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(320px 220px at 15% 0%, rgba(255,0,127,.25), transparent 60%),
        radial-gradient(300px 240px at 85% 10%, rgba(124,58,237,.18), transparent 60%),
        radial-gradient(420px 320px at 40% 110%, rgba(255,51,153,.22), transparent 60%);
      z-index:-1;
    }

    header{
      text-align:center;
      padding: 4px 6px 12px;
    }

    .badge{
      display:inline-flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,0,127,.18), rgba(124,58,237,.12));
      border: 1px solid rgba(255,0,127,.22);
      font-weight:700;
      letter-spacing:.3px;
      font-size: clamp(12px, 2.6vw, 14px);
    }

    /* ====== AJUSTE PRINCIPAL: tudo em coluna (um embaixo do outro) ====== */
    .main{
      display:flex;
      flex-direction:column;
      gap: clamp(14px, 3.6vw, 22px);
      align-items: center;
      margin-top: clamp(10px, 2.2vw, 14px);
    }

    /* --- Caixa de presente --- */
    .giftArea{
      width: 100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .giftHint{
      margin: 0 0 10px;
      font-weight: 700;
      font-size: clamp(13px, 3vw, 15px);
      opacity:.9;
      text-align:center;
    }

    .giftButton{
      border:0;
      background: transparent;
      padding:0;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .giftButton:focus-visible{
      outline: 4px solid rgba(255,0,127,.35);
      outline-offset: 8px;
      border-radius: 22px;
    }

    .gift{
      width: min(340px, 82vw);
      aspect-ratio: 1 / 1;
      position: relative;
      transform: translateZ(0);
      filter: drop-shadow(0 16px 30px rgba(255,0,127,.25));
    }

    .giftBase{
      position:absolute;
      left: 10%;
      right: 10%;
      bottom: 8%;
      height: 44%;
      border-radius: 18px;
      background: linear-gradient(180deg, #ff1a8c, var(--pink-1));
      border: 1px solid rgba(255,255,255,.55);
      overflow:hidden;
    }

    .giftLid{
      position:absolute;
      left: 8%;
      right: 8%;
      bottom: 48%;
      height: 22%;
      border-radius: 18px;
      transform-origin: 20% 90%;
      background: linear-gradient(180deg, #ff4da6, #ff1a8c);
      border: 1px solid rgba(255,255,255,.68);
      box-shadow: 0 14px 26px rgba(124,58,237,.12);
    }

    .ribbonV, .ribbonH{
      position:absolute;
      background: linear-gradient(180deg, #ffb3d9, #ff80bf);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.55);
    }
    .ribbonV{
      width: 12%;
      top: 0;
      bottom: 0;
      left: 44%;
      border-radius: 14px;
    }
    .ribbonH{
      height: 14%;
      left: 0;
      right: 0;
      top: 46%;
      border-radius: 14px;
    }

    .bow{
      position:absolute;
      left: 50%;
      bottom: 70%;
      width: 44%;
      height: 28%;
      transform: translateX(-50%);
    }
    .bow::before, .bow::after{
      content:"";
      position:absolute;
      top: 26%;
      width: 50%;
      height: 58%;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffc2e0, #ff99cc);
      box-shadow: 0 8px 18px rgba(255,0,127,.18);
      border: 1px solid rgba(255,255,255,.7);
    }
    .bow::before{ left: 0; transform: rotate(-12deg); transform-origin: right center;}
    .bow::after{ right: 0; transform: rotate(12deg); transform-origin: left center;}
    .knot{
      position:absolute;
      left:50%;
      top:44%;
      width: 18%;
      height: 18%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #fff, #ffb3d9);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 10px 16px rgba(124,58,237,.10);
    }

    #confetti{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .bigMsg{
      margin-top: 14px;
      text-align:center;
      font-weight: 1000;
      letter-spacing: -.6px;
      font-size: clamp(22px, 6.4vw, 46px);
      line-height: 1.05;
      background: linear-gradient(90deg, var(--pink-1), var(--purple), var(--pink-2));
      -webkit-background-clip:text;
      background-clip:text;
      color: transparent;
      text-shadow: 0 10px 30px rgba(255,0,127,.18);
      transform: scale(.96);
      opacity: 0;
      transition: opacity .35s ease, transform .5s cubic-bezier(.2,.9,.2,1);
    }
    .bigMsg.show{ opacity: 1; transform: scale(1); }

    .side{
      width: min(720px, 100%);
      padding: clamp(12px, 2.6vw, 18px);
      border-radius: 22px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(255,0,127,.15);
      text-align:center;
    }
    .side h2{
      margin: 6px 0 10px;
      font-size: clamp(18px, 4.8vw, 24px);
      letter-spacing: -.3px;
    }
    .side p{
      margin: 0 0 10px;
      font-size: clamp(14px, 3.4vw, 16px);
      line-height: 1.55;
      opacity:.92;
    }
    .side h3{
      margin: 10px 0 0;
      font-size: clamp(14px, 3.6vw, 18px);
      font-weight: 900;
    }

    .open .giftLid{
      animation: lidOpen .75s cubic-bezier(.2,.9,.2,1) forwards;
    }
    @keyframes lidOpen{
      0%{ transform: translateY(0) rotate(0deg); }
      60%{ transform: translateY(-10%) rotate(-18deg); }
      100%{ transform: translateY(-26%) rotate(-28deg); }
    }

    .pulse{ animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-6px); }
    }

    @media (prefers-reduced-motion: reduce){
      .sparkles{animation:none}
      .pulse{animation:none}
      .open .giftLid{animation:none; transform: translateY(-26%) rotate(-28deg);}
      .bigMsg{transition:none}
    }
  </style>
</head>

<body>
  <div class="sparkles" aria-hidden="true"></div>

  <main class="wrap">
    <section class="card" aria-label="Cartão de aniversário da Arielly">
      <header>
        <div class="badge">🎀 7 anos • Arielly • Hoje é dia de festa!</div>
      </header>

      <div class="main">
        <!-- 1) Primeiro: caixa surpresa -->
        <div class="giftArea">
          <p class="giftHint">Toque no presente para abrir</p>

          <button id="giftBtn" class="giftButton" aria-label="Abrir presente" type="button">
            <div id="giftWrap" class="gift pulse">
              <canvas id="confetti"></canvas>

              <div class="bow" aria-hidden="true"><div class="knot"></div></div>
              <div class="giftLid" aria-hidden="true"></div>

              <div class="giftBase" aria-hidden="true">
                <div class="ribbonV"></div>
                <div class="ribbonH"></div>
              </div>
            </div>
          </button>

          <div id="bigMsg" class="bigMsg" role="status" aria-live="polite">
            Feliz Aniversário Arielly
          </div>
        </div>

        <!-- 2) Depois: mensagem especial -->
        <aside class="side" aria-label="Mensagem especial">
          <h2>Uma mensagem especial</h2>
          <p>
            Arielly, hoje você completa <strong>7 aninhos</strong>! Que seu dia seja cheio de brincadeiras,
            sorrisos, bolo gostoso e muita alegria.
          </p>
          <h3>Do seu tio Guilherme e da sua tia Vitoria. Amamos Você!</h3>
        </aside>

        <!-- Música de fundo (royalty-free) -->
        <audio id="bgm" preload="auto" loop playsinline>
          <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2c2b3b9fb6.mp3?filename=happy-birthday-to-you-piano-version-110624.mp3" type="audio/mpeg" />
        </audio>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const giftBtn = document.getElementById('giftBtn');
      const giftWrap = document.getElementById('giftWrap');
      const bigMsg = document.getElementById('bigMsg');

      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d', { alpha: true });

      const audio = document.getElementById('bgm');

      let isOpen = false;
      let animId = null;
      let particles = [];
      let lastT = 0;

      const COLORS = ['#ff007f','#ff3399','#ffb3d9','#7c3aed','#22c55e','#f59e0b','#38bdf8'];

      function resizeCanvasToGift() {
        const rect = giftWrap.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(2.25, window.devicePixelRatio || 1));
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function rand(min, max) { return Math.random() * (max - min) + min; }
      function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

      function burstConfetti() {
        resizeCanvasToGift();

        const rect = giftWrap.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        const originX = w * 0.5;
        const originY = h * 0.38;
        const count = Math.round(Math.min(220, Math.max(120, w * 0.55)));

        particles = [];
        for (let i = 0; i < count; i++) {
          const angle = rand(-Math.PI * 0.95, -Math.PI * 0.05);
          const speed = rand(240, 560) * (w / 320);
          particles.push({
            x: originX, y: originY,
            vx: Math.cos(angle) * speed + rand(-60, 60),
            vy: Math.sin(angle) * speed,
            g: rand(700, 1100),
            rot: rand(0, Math.PI * 2),
            vr: rand(-10, 10),
            size: rand(4, 9),
            shape: Math.random() < 0.65 ? 'rect' : 'circle',
            color: pick(COLORS),
            life: rand(0.95, 1.55),
            t: 0
          });
        }

        lastT = performance.now();
        if (animId) cancelAnimationFrame(animId);
        animId = requestAnimationFrame(tick);
      }

      function tick(now) {
        const dt = Math.min(0.032, (now - lastT) / 1000);
        lastT = now;

        const rect = giftWrap.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        ctx.clearRect(0, 0, w, h);

        let alive = 0;
        for (const p of particles) {
          p.t += dt;
          if (p.t > p.life) continue;
          alive++;

          p.vy += p.g * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rot += p.vr * dt;

          p.vx *= (1 - 0.03);
          p.vy *= (1 - 0.01);

          const fade = Math.max(0, Math.min(1, (p.life - p.t) / 0.35));

          ctx.save();
          ctx.globalAlpha = 0.95 * fade;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;

          if (p.shape === 'rect') ctx.fillRect(-p.size * 0.6, -p.size * 0.35, p.size * 1.2, p.size * 0.7);
          else { ctx.beginPath(); ctx.arc(0, 0, p.size * 0.45, 0, Math.PI * 2); ctx.fill(); }

          ctx.restore();
        }

        if (alive > 0) animId = requestAnimationFrame(tick);
        else ctx.clearRect(0, 0, w, h);
      }

      async function tryPlayAudio() {
        // Em mobile, autoplay pode falhar; isso tenta e não quebra.
        try {
          audio.volume = 0.55;
          await audio.play();
        } catch (_) {}
      }

      function openGift() {
        if (isOpen) return;
        isOpen = true;

        giftWrap.classList.remove('pulse');
        giftWrap.classList.add('open');
        bigMsg.classList.add('show');
        burstConfetti();

        // gesto do usuário ao clicar no presente: ótimo momento para iniciar o áudio
        tryPlayAudio();
      }

      giftBtn.addEventListener('click', openGift, { passive: true });

      window.addEventListener('load', () => {
        resizeCanvasToGift();
        tryPlayAudio();
      });

      window.addEventListener('resize', () => resizeCanvasToGift(), { passive: true });

      // fallback: primeiro toque na tela também tenta liberar o áudio
      window.addEventListener('pointerdown', tryPlayAudio, { once: true });
      window.addEventListener('touchstart', tryPlayAudio, { once: true, passive: true });
    })();
  </script>
</body>
</html>
